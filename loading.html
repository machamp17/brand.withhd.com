<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WITH HOLDINGS — Loading</title>
<style>
  :root{
    --gold:#D4A24A;
    --gold-soft:#E8C988;
    --gold-bright:#FFE9B6;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a1410;font-family:'Noto Serif JP',serif}

  .stage{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 70% 55% at 50% 50%, rgba(8,18,15,.15) 0%, rgba(8,18,15,.78) 75%, rgba(6,14,11,.92) 100%),
      url('assets/loading-forest.png') center/cover no-repeat;
    filter:saturate(.85);
  }
  .stage::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 32% 24% at 50% 48%, rgba(212,162,74,.10) 0%, transparent 65%);
    animation:breathe 7s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes breathe{
    0%,100%{opacity:.55;transform:scale(.98)}
    50%{opacity:1;transform:scale(1.05)}
  }

  .grain{
    position:absolute;inset:-50%;pointer-events:none;opacity:.07;
    background-image:
      radial-gradient(rgba(255,255,255,.5) 1px, transparent 1.5px),
      radial-gradient(rgba(255,255,255,.4) 1px, transparent 1.4px);
    background-size:3px 3px, 5px 5px;
    background-position:0 0, 1px 1px;
    mix-blend-mode:overlay;
    animation:grainShift .8s steps(3) infinite;
  }
  @keyframes grainShift{
    0%{transform:translate(0,0)}
    33%{transform:translate(-1%,1%)}
    66%{transform:translate(1%,-1%)}
    100%{transform:translate(0,0)}
  }

  /* ====== loader ====== */
  .loader{
    position:absolute;left:50%;top:50%;
    width:200px;height:200px;
    transform:translate(-50%,-50%);
  }

  /* outer halo */
  .halo{
    position:absolute;inset:-60px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%, rgba(212,162,74,.16) 0%, rgba(212,162,74,0) 60%);
    pointer-events:none;
    animation:haloPulse 4.5s ease-in-out infinite;
  }
  @keyframes haloPulse{
    0%,100%{opacity:.55}
    50%{opacity:1}
  }

  /* two static rings */
  .ring{
    position:absolute;border-radius:50%;
    border:1px solid rgba(212,162,74,.28);
    box-shadow:
      0 0 24px rgba(212,162,74,.06) inset,
      0 0 28px rgba(0,0,0,.35);
  }
  .ring.outer{inset:0}
  .ring.inner{inset:30px;border-color:rgba(212,162,74,.22)}

  /* rotating arms — outer slow, inner faster, so dots periodically overlap (catch-up) */
  .arm{
    position:absolute;border-radius:50%;
    transform-origin:50% 50%;
  }
  .arm.outer{inset:0;animation:spin 6.5s linear infinite}
  .arm.inner{inset:30px;animation:spin 4.2s linear infinite}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  /* glowing dot at top of each arm */
  .dot{
    position:absolute;left:50%;top:0;
    width:9px;height:9px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, #fff5dc 0%, var(--gold-bright) 30%, var(--gold-soft) 55%, var(--gold) 80%, rgba(212,162,74,0) 100%);
    box-shadow:
      0 0 8px rgba(255,235,190,1),
      0 0 18px rgba(232,201,136,.85),
      0 0 38px rgba(212,162,74,.6),
      0 0 70px rgba(212,162,74,.32);
  }
  .arm.inner .dot{width:7px;height:7px}

  /* comet trails: conic gradient masked to a thin ring at each radius */
  .trail{
    position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(
      from -90deg,
      rgba(212,162,74,0) 0deg,
      rgba(212,162,74,0) 240deg,
      rgba(212,162,74,.16) 310deg,
      rgba(232,201,136,.55) 350deg,
      rgba(255,245,220,.95) 360deg
    );
  }
  /* outer ring: r ≈ 100px (since loader is 200×200) */
  .arm.outer .trail{
    -webkit-mask:radial-gradient(circle at 50% 50%, transparent 98px, #000 99px, #000 100px, transparent 101px);
            mask:radial-gradient(circle at 50% 50%, transparent 98px, #000 99px, #000 100px, transparent 101px);
  }
  /* inner ring: arm.inner is inset 30px, so its 100% is 140×140; r ≈ 70px */
  .arm.inner .trail{
    -webkit-mask:radial-gradient(circle at 50% 50%, transparent 68px, #000 69px, #000 70px, transparent 71px);
            mask:radial-gradient(circle at 50% 50%, transparent 68px, #000 69px, #000 70px, transparent 71px);
  }

  /* center text */
  .center{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    text-align:center;color:rgba(232,201,136,.9);
    pointer-events:none;
  }
  .center .loading{
    font-size:13px;font-weight:500;letter-spacing:.62em;
    padding-left:.62em; /* compensate trailing letter-spacing for visual centering */
    color:#E8C988;
    text-shadow:0 0 14px rgba(212,162,74,.45),0 0 30px rgba(212,162,74,.18);
    animation:textPulse 2.4s ease-in-out infinite;
  }
  @keyframes textPulse{
    0%,100%{opacity:.7}
    50%{opacity:1}
  }
  .center .dots{
    display:flex;justify-content:center;gap:7px;margin-top:14px;
  }
  .center .dots i{
    width:3px;height:3px;border-radius:50%;background:#E8C988;
    box-shadow:0 0 6px rgba(232,201,136,.8);
    opacity:.3;animation:dotsBlink 1.4s ease-in-out infinite;
  }
  .center .dots i:nth-child(1){animation-delay:0s}
  .center .dots i:nth-child(2){animation-delay:.2s}
  .center .dots i:nth-child(3){animation-delay:.4s}
  @keyframes dotsBlink{
    0%,80%,100%{opacity:.25;transform:scale(.85)}
    40%{opacity:1;transform:scale(1.15)}
  }

  /* brand mark at bottom — clearer */
  .brand{
    position:absolute;left:50%;bottom:56px;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .brand .name{
    display:flex;align-items:center;gap:18px;
    color:#E8C988;font-size:14px;font-weight:500;
    letter-spacing:.46em;padding-left:.46em;
    text-shadow:0 0 16px rgba(212,162,74,.45);
  }
  .brand .name::before,.brand .name::after{
    content:'';width:42px;height:1px;background:rgba(212,162,74,.55);
  }
  .brand .jp{
    font-size:10px;letter-spacing:.32em;color:rgba(232,201,136,.55);
    padding-left:.32em;
  }

  @media (max-width:600px){
    .loader{width:160px;height:160px}
    .ring.inner,.arm.inner{inset:24px}
    .arm.outer .trail{
      -webkit-mask:radial-gradient(circle at 50% 50%, transparent 78px, #000 79px, #000 80px, transparent 81px);
              mask:radial-gradient(circle at 50% 50%, transparent 78px, #000 79px, #000 80px, transparent 81px);
    }
    .arm.inner .trail{
      -webkit-mask:radial-gradient(circle at 50% 50%, transparent 54px, #000 55px, #000 56px, transparent 57px);
              mask:radial-gradient(circle at 50% 50%, transparent 54px, #000 55px, #000 56px, transparent 57px);
    }
    .center .loading{font-size:11px;letter-spacing:.5em;padding-left:.5em}
    .brand .name{font-size:12px;letter-spacing:.38em;padding-left:.38em}
    .brand .name::before,.brand .name::after{width:28px}
  }
</style>
  <script src="assets/whd-cursor.js" defer></script>
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
</head>
<body>

<div class="stage">
  <div class="grain"></div>

  <div class="loader" data-screen-label="Loading">
    <div class="halo"></div>
    <div class="ring outer"></div>
    <div class="ring inner"></div>

    <div class="arm outer">
      <div class="trail"></div>
      <div class="dot"></div>
    </div>
    <div class="arm inner">
      <div class="trail"></div>
      <div class="dot"></div>
    </div>

    <div class="center">
      <div class="loading">LOADING</div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>
  </div>

  <div class="brand" aria-hidden="true">
    <div class="name">WITH HOLDINGS</div>
    <div class="jp">CONNECTING PEOPLE, BUSINESSES AND THE FUTURE</div>
  </div>
</div>

</body>
</html>
