<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>500 Server Error | WITH HOLDINGS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0F3D34;--green-deep:#0a2a24;--gold:#D4A24A;--gold-soft:#E8C988;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Noto Sans JP','Hiragino Sans',sans-serif;color:#fff;
    background:linear-gradient(180deg,var(--green) 0%,var(--green-deep) 100%);
    -webkit-font-smoothing:antialiased;font-feature-settings:"palt";
    line-height:1.85;min-height:100vh;display:flex;flex-direction:column;
    position:relative;overflow-x:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 80% 18%,rgba(212,162,74,.16) 0%,transparent 55%),
      radial-gradient(ellipse at 12% 90%,rgba(212,162,74,.08) 0%,transparent 55%);
    pointer-events:none;
  }
  a{color:inherit;text-decoration:none}
  .container{max-width:1200px;margin:0 auto;padding:0 32px;width:100%}

  nav.gnav{position:fixed;top:0;left:0;right:0;z-index:50;
    background:rgba(10,42,36,.55);backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid rgba(212,162,74,.16)}
  nav.gnav .row{display:flex;align-items:center;justify-content:space-between;height:72px}
  nav.gnav .brand{display:flex;align-items:center;gap:14px;color:#fff}
  nav.gnav .brand .name{font-family:'Noto Serif JP',serif;font-size:14px;
    font-weight:500;letter-spacing:.2em;color:#fff}
  nav.gnav .home{font-size:11px;letter-spacing:.32em;color:rgba(255,255,255,.7);
    transition:color .25s}
  nav.gnav .home:hover{color:var(--gold)}

  main{flex:1;display:flex;align-items:center;position:relative;z-index:1;
    padding:120px 0 80px}
  .err{max-width:680px;margin:0 auto;text-align:center}
  .code{
    font-family:'Cormorant Garamond',serif;font-weight:300;
    font-size:clamp(120px,18vw,200px);line-height:1;letter-spacing:.02em;
    color:var(--gold);margin-bottom:8px;
    text-shadow:0 8px 40px rgba(212,162,74,.18);
  }
  .eyebrow{font-size:11px;letter-spacing:.42em;color:var(--gold-soft);
    font-weight:500;margin-bottom:24px}
  .msg{font-family:'Noto Serif JP',serif;font-weight:400;
    font-size:clamp(22px,3vw,30px);line-height:1.55;letter-spacing:.04em;
    margin-bottom:28px;color:#fff}
  .sub{font-size:14px;line-height:2;color:rgba(255,255,255,.7);
    margin-bottom:48px;max-width:520px;margin-left:auto;margin-right:auto}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
    margin-bottom:48px}
  .btn{
    display:inline-flex;align-items:center;gap:12px;
    padding:16px 32px;font-size:11px;letter-spacing:.32em;font-weight:600;
    border-radius:2px;border:1px solid transparent;transition:all .3s ease;
  }
  .btn-primary{background:var(--gold);color:var(--green-deep);border-color:var(--gold)}
  .btn-primary:hover{background:var(--gold-soft);border-color:var(--gold-soft)}
  .btn .arr{transition:transform .25s ease}
  .btn:hover .arr{transform:translateX(4px)}
  .divider{width:48px;height:1px;background:rgba(212,162,74,.4);margin:0 auto 28px}
  .contact-card{
    display:inline-block;text-align:left;
    padding:22px 32px;border:1px solid rgba(212,162,74,.3);border-radius:4px;
    background:rgba(255,255,255,.03);
  }
  .contact-card .label{font-size:10px;letter-spacing:.32em;color:var(--gold);
    font-weight:600;margin-bottom:10px}
  .contact-card .name{font-family:'Noto Serif JP',serif;font-size:13px;
    color:#fff;margin-bottom:8px;letter-spacing:.06em}
  .contact-card .line{font-size:12px;line-height:1.9;color:rgba(255,255,255,.7)}
  .contact-card a{color:var(--gold-soft);text-decoration:underline;text-underline-offset:3px}
  .contact-card a:hover{color:var(--gold)}

  footer{position:relative;z-index:1;padding:24px 0;
    border-top:1px solid rgba(255,255,255,.08)}
  footer .row{display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:16px;font-size:10px;letter-spacing:.2em;
    color:rgba(255,255,255,.4)}
  footer .row a{transition:color .25s}
  footer .row a:hover{color:var(--gold)}
</style>
  <script src="assets/whd-cursor.js" defer></script>
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
</head>
<body data-screen-label="500 Page">

<nav class="gnav">
  <div class="container row">
    <a href="index.html" class="brand">
      <img src="assets/with-holdings-mark-white.png" alt="WITH HOLDINGS" style="width:auto;height:36px;display:block"/>
      <span class="name">WITH HOLDINGS</span>
    </a>
    <a href="index.html" class="home">← BACK TO HOME</a>
  </div>
</nav>

<main>
  <div class="container">
    <div class="err">
      <div class="code">500</div>
      <div class="eyebrow">SERVER ERROR</div>
      <h1 class="msg">申し訳ございません、現在ページを表示できません</h1>
      <p class="sub">
        サーバーで一時的な問題が発生しています。<br/>
        お手数ですが、しばらく時間をおいてから再度アクセスをお試しください。
      </p>
      <div class="actions">
        <a href="index.html" class="btn btn-primary">
          トップページへ戻る <span class="arr">→</span>
        </a>
      </div>
      <div class="divider"></div>
      <div class="contact-card">
        <div class="label">CONTACT</div>
        <div class="name">株式会社 WITH HOLDINGS</div>
        <div class="line">
          メール：<a href="mailto:support@withhd.com">support@withhd.com</a><br/>
          受付：平日 9時〜18時（土日祝日および年末年始を除く）
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container row">
    <div>© WITH HOLDINGS Co., Ltd. ALL RIGHTS RESERVED.</div>
    <div style="display:flex;gap:24px">
      <a href="privacy.html">PRIVACY</a>
      <a href="terms.html">TERMS</a>
    </div>
  </div>
</footer>

</body>
</html>
